services:
  freeradius:
    # Alpine variant: libldap is built against OpenSSL, matching FreeRADIUS —
    # the Ubuntu-based image mixes GnuTLS/OpenSSL and warns of possible crashes.
    image: freeradius/freeradius-server:3.2.7-alpine
    container_name: freeradius
    # Log to container stdout AND to the shared radius-logs volume (read by
    # the radius-admin log viewer). tee runs off a fifo so `exec` can keep
    # radiusd as PID 1 (docker stop signals it directly).
    command:
      - sh
      - -c
      - |
        rm -f /tmp/log.pipe && mkfifo /tmp/log.pipe
        tee -a /logs/radius.log < /tmp/log.pipe &
        exec radiusd -f -l stdout > /tmp/log.pipe 2>&1
    env_file: .env
    ports:
      - "0.0.0.0:${RADIUS_AUTH_PORT:-1812}:1812/udp"
      - "0.0.0.0:${RADIUS_ACCT_PORT:-1813}:1813/udp"
    volumes:
      - ./freeradius/raddb/clients.conf:/etc/raddb/clients.conf:ro
      - ./freeradius/raddb/mods-enabled/ldap:/etc/raddb/mods-enabled/ldap:ro
      - ./freeradius/raddb/sites-available/default:/etc/raddb/sites-available/default:ro
      - ./freeradius/raddb/sites-available/inner-tunnel:/etc/raddb/sites-available/inner-tunnel:ro
      # Shared with radius-admin, which writes the generated 'authorize'
      # users file here (custom reply attributes per LDAP group).
      - radius-policy:/opt/etc/raddb/mods-config/files
      # Server log, shared read/write with radius-admin (viewer + rotation).
      # Deliberately not /var/log/radius: that would drag radacct into the
      # volume.
      - radius-logs:/logs
    restart: unless-stopped

  # Web admin panel: manages custom RADIUS reply attributes (Cisco /
  # Check Point Gaia / Brocade ICX presets), authenticates against the same
  # LDAP as RADIUS, gated by ADMIN_GROUP membership. Built automatically by
  # 'docker compose up -d' on first run.
  radius-admin:
    build: ./web
    container_name: radius-admin
    env_file: .env
    ports:
      - "0.0.0.0:${ADMIN_PORT:-8080}:8080"
    volumes:
      - radius-policy:/radius-files
      - admin-data:/data
      - radius-logs:/logs
    # Share the freeradius PID namespace so the admin app can SIGHUP radiusd
    # to reload the users file after changes are applied.
    pid: "container:freeradius"
    depends_on:
      - freeradius
    restart: unless-stopped

volumes:
  # Generated FreeRADIUS users file, written by radius-admin, read by freeradius
  radius-policy:
  # radius-admin rule definitions and apply state
  admin-data:
  # radiusd log file (tee'd copy of stdout), shown in the admin panel
  radius-logs:
