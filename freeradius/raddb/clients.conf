# RADIUS clients (NAS devices) are managed by the radius-admin web panel
# (Clients tab), which writes the full client list to a shared volume and
# restarts radiusd to load it (FreeRADIUS reloads clients only on restart).
#
# $-INCLUDE (optional include) lets the server start before the panel has
# written the file, e.g. on the very first `docker compose up`: radiusd
# comes up with no clients, then radius-admin seeds a default client and
# restarts it. The path is relative to this file's directory (/etc/raddb).
$-INCLUDE clients-generated/clients.conf
