# RADIUS clients (NAS devices) allowed to talk to this server.
# All values come from environment variables -- see .env.example.

client nas {
	ipaddr = $ENV{RADIUS_CLIENT_IP}
	proto = udp
	secret = "$ENV{RADIUS_CLIENT_SECRET}"
	nas_type = other

	# BlastRADIUS (CVE-2024-3596) mitigation. See .env.example.
	require_message_authenticator = $ENV{RADIUS_REQUIRE_MESSAGE_AUTHENTICATOR}
	limit_proxy_state = $ENV{RADIUS_LIMIT_PROXY_STATE}
}
